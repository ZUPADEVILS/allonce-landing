<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0047FF"/>
      <stop offset="55%" stop-color="#0033B8"/>
      <stop offset="100%" stop-color="#001A66"/>
    </linearGradient>
    <radialGradient id="sp-flare" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0047FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sp-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#sp-bg)"/>
  <rect width="800" height="1000" fill="url(#sp-flare)"/>

  <text x="60" y="80" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">03 — SPAWN</text>
  <text x="740" y="80" text-anchor="end" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">A PARAGRAPH IN</text>

  <!-- Source seed at top of graphic zone -->
  <g transform="translate(400,440)">
    <circle r="11" fill="#FFFFFF"/>
    <circle r="34" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.2"/>
    <circle r="60" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>
    <!-- pulsing ring -->
    <circle r="11" fill="none" stroke="#FFFFFF" stroke-width="2">
      <animate attributeName="r" values="11;90;11" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connector lines -->
  <g stroke="url(#sp-line)" stroke-width="1.2" fill="none" opacity="0.95">
    <path d="M400 452 C 400 560, 130 660, 130 820"/>
    <path d="M400 452 C 400 560, 220 650, 220 820"/>
    <path d="M400 452 C 400 560, 310 640, 310 820"/>
    <path d="M400 452 C 400 560, 400 640, 400 820"/>
    <path d="M400 452 C 400 560, 490 640, 490 820"/>
    <path d="M400 452 C 400 560, 580 650, 580 820"/>
    <path d="M400 452 C 400 560, 670 660, 670 820"/>
  </g>

  <!-- Light dots traveling DOWN each line -->
  <g fill="#FFFFFF">
    <circle r="3.5">
      <animateMotion path="M400 452 C 400 560, 130 660, 130 820" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5">
      <animateMotion path="M400 452 C 400 560, 310 640, 310 820" dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5">
      <animateMotion path="M400 452 C 400 560, 400 640, 400 820" dur="2.8s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5">
      <animateMotion path="M400 452 C 400 560, 490 640, 490 820" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5">
      <animateMotion path="M400 452 C 400 560, 670 660, 670 820" dur="2.8s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Output cards -->
  <g fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="1">
    <rect x="100"  y="820" width="60" height="80" rx="3"/>
    <rect x="190"  y="820" width="60" height="80" rx="3"/>
    <rect x="280"  y="820" width="60" height="80" rx="3"/>
    <rect x="370"  y="820" width="60" height="80" rx="3"/>
    <rect x="460"  y="820" width="60" height="80" rx="3"/>
    <rect x="550"  y="820" width="60" height="80" rx="3"/>
    <rect x="640"  y="820" width="60" height="80" rx="3"/>
  </g>

  <!-- Caption -->
  <text x="60" y="920" font-family="Inter,sans-serif" font-size="20" font-weight="500" fill="#FFFFFF" fill-opacity="0.9" letter-spacing="-0.5">A paragraph in. A whole company out.</text>
</svg>
