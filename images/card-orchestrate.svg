<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="or-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="60%" stop-color="#0033B8"/>
      <stop offset="100%" stop-color="#000F4D"/>
    </linearGradient>
    <radialGradient id="or-flare" cx="20%" cy="80%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#0047FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#or-bg)"/>
  <rect width="800" height="1000" fill="url(#or-flare)"/>

  <!-- Corner kicker -->
  <text x="60" y="80" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">02 — ORCHESTRATE</text>
  <text x="740" y="80" text-anchor="end" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">SIX TEAMS</text>

  <!-- Six stacked timelines (y=470..830) -->
  <g font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" fill-opacity="0.7" letter-spacing="1.2">
    <text x="60" y="478">SALES</text>
    <text x="60" y="538">OPS</text>
    <text x="60" y="598">SUPPORT</text>
    <text x="60" y="658">MARKETING</text>
    <text x="60" y="718">FINANCE</text>
    <text x="60" y="778">PRODUCT</text>
  </g>

  <!-- Track lines -->
  <g stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1">
    <line x1="220" y1="473" x2="740" y2="473"/>
    <line x1="220" y1="533" x2="740" y2="533"/>
    <line x1="220" y1="593" x2="740" y2="593"/>
    <line x1="220" y1="653" x2="740" y2="653"/>
    <line x1="220" y1="713" x2="740" y2="713"/>
    <line x1="220" y1="773" x2="740" y2="773"/>
  </g>

  <!-- Task chips with subtle pulse-in -->
  <g fill="#FFFFFF" fill-opacity="0.22" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="1">
    <rect x="240" y="460" width="120" height="26" rx="3"/>
    <rect x="400" y="460" width="80"  height="26" rx="3"/>
    <rect x="260" y="520" width="200" height="26" rx="3"/>
    <rect x="290" y="580" width="90"  height="26" rx="3"/>
    <rect x="400" y="580" width="160" height="26" rx="3"/>
    <rect x="240" y="640" width="160" height="26" rx="3"/>
    <rect x="420" y="640" width="100" height="26" rx="3"/>
    <rect x="280" y="700" width="240" height="26" rx="3"/>
    <rect x="240" y="760" width="120" height="26" rx="3"/>
    <rect x="380" y="760" width="190" height="26" rx="3"/>
  </g>

  <!-- Vertical NOW playhead — sweeps across continuously -->
  <g>
    <line x1="0" y1="450" x2="0" y2="800" stroke="#FFFFFF" stroke-width="1.5">
      <animate attributeName="x1" values="220;740;220" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="220;740;220" dur="6s" repeatCount="indefinite"/>
    </line>
    <circle cy="450" r="5" fill="#FFFFFF">
      <animate attributeName="cx" values="220;740;220" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text y="436" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" letter-spacing="1.4">
      <animate attributeName="x" values="200;720;200" dur="6s" repeatCount="indefinite"/>
      NOW
    </text>
  </g>

  <!-- Caption -->
  <text x="60" y="920" font-family="Inter,sans-serif" font-size="20" font-weight="500" fill="#FFFFFF" fill-opacity="0.9" letter-spacing="-0.5">Six teams, one tempo. Conducted, not chased.</text>
</svg>
