<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ev-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1F3A"/>
      <stop offset="55%" stop-color="#C40012"/>
      <stop offset="100%" stop-color="#5A0008"/>
    </linearGradient>
    <radialGradient id="ev-flare" cx="78%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#FFE5E0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF1F3A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ev-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#ev-bg)"/>
  <rect width="800" height="1000" fill="url(#ev-flare)"/>

  <!-- Corner kicker (out of title path) -->
  <text x="60" y="80" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">01 — EVOLVE</text>
  <g transform="translate(740,76)">
    <text x="-18" y="4" text-anchor="end" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">LIVE</text>
    <circle r="4" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Y-axis ticks -->
  <g font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#FFFFFF" fill-opacity="0.5" letter-spacing="0.4">
    <text x="20" y="500">$200k</text>
    <text x="28" y="600">$150k</text>
    <text x="28" y="700">$100k</text>
    <text x="36" y="800">$50k</text>
    <text x="50" y="880">$0</text>
  </g>

  <!-- Grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1">
    <line x1="80" y1="500" x2="720" y2="500"/>
    <line x1="80" y1="600" x2="720" y2="600"/>
    <line x1="80" y1="700" x2="720" y2="700"/>
    <line x1="80" y1="800" x2="720" y2="800"/>
    <line x1="80" y1="880" x2="720" y2="880"/>
  </g>

  <!-- Filled area under main curve -->
  <path d="M80 850 C 180 836, 260 800, 340 760 S 470 640, 560 560 S 700 480, 720 470 L 720 880 L 80 880 Z" fill="url(#ev-fill)"/>

  <!-- Last-year baseline (dashed, muted) -->
  <path d="M80 870 C 200 868, 320 850, 420 820 S 580 760, 720 720"
        stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.5" fill="none" stroke-dasharray="3 5"/>

  <!-- Main curve -->
  <path id="ev-curve" d="M80 850 C 180 836, 260 800, 340 760 S 470 640, 560 560 S 700 480, 720 470"
        stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Light-pulse traveling along the curve -->
  <path d="M80 850 C 180 836, 260 800, 340 760 S 470 640, 560 560 S 700 480, 720 470"
        stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round"
        stroke-dasharray="50 1500" stroke-dashoffset="0" opacity="0.85">
    <animate attributeName="stroke-dashoffset" from="0" to="-1550" dur="4.2s" repeatCount="indefinite"/>
  </path>

  <!-- Data points -->
  <g fill="#FFFFFF">
    <circle cx="80"  cy="850" r="4"/>
    <circle cx="200" cy="826" r="4"/>
    <circle cx="340" cy="760" r="5"/>
    <circle cx="460" cy="660" r="4"/>
    <circle cx="560" cy="560" r="5"/>
    <circle cx="640" cy="510" r="4"/>
  </g>
  <!-- Latest point — pulsing halo -->
  <circle cx="720" cy="470" r="7" fill="#FFFFFF"/>
  <circle cx="720" cy="470" r="7" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8">
    <animate attributeName="r" values="7;28;7" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Latest-value chip -->
  <g transform="translate(518,408)">
    <rect width="200" height="44" rx="3" fill="#FFFFFF"/>
    <text x="14" y="18" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#5A0008" letter-spacing="1.6">REVENUE — NOV</text>
    <text x="14" y="36" font-family="Inter,sans-serif" font-size="16" font-weight="600" fill="#0E0E0E" letter-spacing="-0.4">$184,210
      <tspan font-size="11" fill="#C40012" dx="6">▲ 12.4%</tspan>
    </text>
  </g>

  <!-- Months axis -->
  <g font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#FFFFFF" fill-opacity="0.55" letter-spacing="0.4">
    <text x="76"  y="910">JAN</text>
    <text x="186" y="910">MAR</text>
    <text x="298" y="910">MAY</text>
    <text x="416" y="910">JUL</text>
    <text x="528" y="910">SEP</text>
    <text x="650" y="910">NOV</text>
  </g>

  <!-- Caption -->
  <text x="60" y="920" font-family="Inter,sans-serif" font-size="20" font-weight="500" fill="#FFFFFF" fill-opacity="0.9" letter-spacing="-0.5">Your stack adapts. Your business compounds.</text>
</svg>
