<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In — AllOnce © One Backend</title>
<meta name="description" content="Sign in to AllOnce — one window for every customer, every dollar, every decision.">
<meta name="theme-color" content="#0000FF">
<link rel="stylesheet" href="/css/style-0.css" data-precedence="next">
<link rel="stylesheet" href="/css/theme-light.css" data-precedence="next">
<link rel="stylesheet" href="/css/signin.css" data-precedence="next">
<link rel="icon" href="/favicon.ico" sizes="32x32" type="image/x-icon">
</head>
<body class="auth-body">

<main class="auth-stage" role="main">

  <!-- Floating mark, top-left -->
  <a href="/index.html" class="auth-mark" aria-label="AllOnce home">
    <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
      <rect x="14" y="16" width="3.6" height="16" fill="#FFFFFF"/>
      <rect x="22" y="10" width="3.6" height="28" fill="#FFFFFF"/>
      <rect x="30" y="18" width="3.6" height="12" fill="#FFFFFF"/>
    </svg>
  </a>

  <!-- Floating mode toggle, top-right -->
  <div class="auth-toggle" role="tablist" aria-label="Auth mode">
    <button type="button" class="auth-toggle-btn" data-mode="register" role="tab" aria-selected="false">Register</button>
    <button type="button" class="auth-toggle-btn is-active" data-mode="login" role="tab" aria-selected="true">Login</button>
    <span class="auth-toggle-pill" aria-hidden="true"></span>
  </div>

  <!-- Centered floating form -->
  <section class="auth-panel" aria-labelledby="auth-heading">

    <h1 id="auth-heading" class="auth-heading">Welcome to AllOnce</h1>
    <p class="auth-tagline">One window. One key. The whole company.</p>

    <form class="auth-fields" autocomplete="off" data-form-type="other" novalidate>

      <label class="auth-field" data-mode="register">
        <input type="text" name="username" placeholder="Username" autocomplete="off" data-1p-ignore>
      </label>

      <label class="auth-field">
        <input type="email" name="email" placeholder="Email" required autocomplete="off" data-1p-ignore>
      </label>

      <label class="auth-field auth-field-password">
        <input type="password" name="password" placeholder="Password" required minlength="8" autocomplete="new-password" data-1p-ignore>
        <button type="button" class="auth-eye" aria-label="Toggle password visibility">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </label>

      <button type="submit" class="auth-cta">
        <span class="auth-cta-text">Open my workspace</span>
        <svg class="auth-cta-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>

      <div class="auth-divider"><span>or</span></div>

      <div class="auth-social">
        <button type="button" class="auth-social-btn" aria-label="Continue with Google">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#FFFFFF" d="M23.49 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.45c-.28 1.45-1.13 2.68-2.4 3.5v2.91h3.88c2.27-2.09 3.56-5.17 3.56-8.65zM12 24c3.24 0 5.95-1.08 7.93-2.91l-3.88-2.91c-1.08.72-2.45 1.16-4.05 1.16-3.11 0-5.74-2.1-6.69-4.93H1.31v3.07A11.99 11.99 0 0 0 12 24zM5.31 14.41c-.24-.72-.38-1.49-.38-2.41s.14-1.69.38-2.41V6.52H1.31A11.99 11.99 0 0 0 0 12c0 1.94.47 3.78 1.31 5.48l4-3.07zM12 4.74c1.76 0 3.34.6 4.58 1.79l3.43-3.43C17.94 1.19 15.24 0 12 0A11.99 11.99 0 0 0 1.31 6.52l4 3.07C6.26 6.84 8.89 4.74 12 4.74z"/>
          </svg>
          Google
        </button>
        <button type="button" class="auth-social-btn" aria-label="Continue with Apple">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#FFFFFF" aria-hidden="true"><path d="M16.36 1.43c.06 1.21-.43 2.4-1.18 3.27-.79.92-2.07 1.62-3.31 1.52-.07-1.18.49-2.39 1.21-3.18.81-.91 2.16-1.59 3.28-1.61zM20.4 17.6c-.59 1.36-.87 1.97-1.62 3.16-1.06 1.66-2.55 3.73-4.4 3.74-1.65.02-2.07-1.07-4.31-1.06-2.24.01-2.7 1.08-4.35 1.07-1.85-.02-3.27-1.88-4.33-3.55-2.97-4.65-3.28-10.1-1.45-13 1.3-2.06 3.36-3.27 5.29-3.27 1.96 0 3.2 1.07 4.82 1.07 1.57 0 2.53-1.07 4.8-1.07 1.72 0 3.55.94 4.85 2.55-4.27 2.34-3.57 8.45.7 10.36z"/></svg>
          Apple
        </button>
      </div>

      <p class="auth-foot">
        New here? <a href="#">Request access ↗</a>
      </p>

    </form>

  </section>

  <!-- Bottom-center cue -->
  <p class="auth-cue">AllOnce greets you. Then asks one question.</p>

</main>

<script>
  const toggleBtns = document.querySelectorAll('.auth-toggle-btn');
  const pill = document.querySelector('.auth-toggle-pill');
  const usernameField = document.querySelector('.auth-field[data-mode="register"]');
  const ctaText = document.querySelector('.auth-cta-text');

  function setMode(mode){
    toggleBtns.forEach(b => {
      const on = b.dataset.mode === mode;
      b.classList.toggle('is-active', on);
      b.setAttribute('aria-selected', on);
    });
    if (pill) pill.style.transform = `translateX(${mode === 'register' ? 0 : 100}%)`;
    if (usernameField) usernameField.style.display = mode === 'register' ? '' : 'none';
    if (ctaText) ctaText.textContent = mode === 'register' ? 'Start your workspace' : 'Open my workspace';
  }
  toggleBtns.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
  setMode('login');

  const eye = document.querySelector('.auth-eye');
  const pwd = document.querySelector('input[name="password"]');
  if (eye && pwd) {
    eye.addEventListener('click', () => {
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      eye.classList.toggle('is-revealed');
    });
  }

  document.querySelector('.auth-fields').addEventListener('submit', function(e){
    e.preventDefault();
    const cta = document.querySelector('.auth-cta');
    cta.disabled = true;
    if (ctaText) ctaText.textContent = 'Spawning your workspace…';
    setTimeout(() => { if (ctaText) ctaText.textContent = 'Demo build — backend not wired yet'; }, 1100);
  });
</script>
</body>
</html>
